name: SMBBackup
options:
  bundleIdPrefix: com.smbbackup
targets:
  SMBBackup:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smbbackup.app
        SWIFT_VERSION: "5.9"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "SMB Backup"
        UILaunchScreen: {}
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.smbbackup.upload
        NSPhotoLibraryUsageDescription: "Diese App benoetigt Zugriff auf deine Fotomediathek, um Fotos und Videos sichern zu koennen."
        NSLocalNetworkUsageDescription: "Diese App benoetigt Zugriff auf dein lokales Netzwerk, um Verbindungen zum SMB-Server aufzubauen."
    dependencies:
      - package: AMSMB2
packages:
  AMSMB2:
    url: https://github.com/amosavian/AMSMB2.git
    from: 3.0.0
